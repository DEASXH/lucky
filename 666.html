<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КЛИКЕР</title>
    <style>
        body {
            background: #929292;
            background-image: repeating-linear-gradient(45deg, #4d4d4d 0px, #4d4d4d 2px, #4d4d4d 2px, #4d4d4d 8px);
            font-family: 'Courier New', 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #000000;
            border: 8px ridge #ffffff;
            padding: 20px 20px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 12px 12px 0 #ffffff;
            transform: rotate(-0.5deg);
            transition: transform 0.2s;
        }
        .game-container:hover {
            transform: rotate(0deg);
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 8px;
            text-align: center;
            letter-spacing: -2px;
            background: #000000;
            color: #ffffff;
            display: inline-block;
            width: auto;
            padding: 0 12px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            border-right: 6px solid #ffffff;
            border-bottom: 4px solid #ffffff;
            transform: skew(-5deg);
        }

        .tagline {
            text-align: center;
            font-size: 0.8rem;
            background: #ffffff;
            padding: 6px;
            margin-top: -8px;
            margin-bottom: 20px;
            font-style: italic;
            border-left: 4px solid #ffffff;
        }

        .timer {
            background:     #ffffff;
            color: #000000;
            font-size: 58px;
            font-weight: bold;
            text-align: center;
            font-family: 'Courier New', monospace;
            padding: 12px 0;
            margin: 16px 0;
            border-radius: 0;
            letter-spacing: 6px;
            text-shadow: 0 0 3px #000000;
            box-shadow: inset 0 0 10px #00000066, 4px 4px 0 #ffffff;
            border: 1px solid #ffffff;
        }

        .score {
            background: #fcfcfc;
            color: #000000;
            font-size: 42px;    
            text-align: center;
            font-weight: bold;
            padding: 10px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            border-left: 12px solid #ffffff;
            border-bottom: 3px solid #ffffff;
        }

        .click-btn {    
            background: #ffffff;
            border: 4px outset #000000;
            color: #000000;
            font-size: 3rem;
            font-weight: bold;
            padding: 20px 0;
            width: 100%;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.03s linear;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            box-shadow: 6px 6px 0 #000000;
        }
        .click-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #ffffff;
            border-style: inset;
        }

        .result {
            background: #fffbe6;
            border-left: 12px solid #000000;
            padding: 12px;
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            word-break: break-word;
            box-shadow: 3px 3px 0 #000000;
        }

        .promo {
            background: #283d3b;
            color: #ffffff;
            padding: 12px;
            margin-top: 18px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            font-family: 'Courier New', monospace;
            border: 3px dotted #ffffff;
            word-break: break-all;
        }

        .info {
            font-size: 0.7rem;
            margin-top: 20px;
            background: #ffffff;
            padding: 8px;
            text-align: center;
            border-top: 2px dashed #ffffff;
        }

        button {
            background: none;
            border: none;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }   
        .blink-text {
            animation: blink 0.8s step-start infinite;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h1>🖲️ КЛИКЕР🖲️</h1>
        <span style="font-size: 12px;">v.0xDEAD</span>
    </div>
    <div class="tagline">👉 жми, пока не сломаешь палец 👈</div>
    
    <div class="timer" id="timerDisplay">10.0</div>
    <div class="score" id="scoreDisplay">🏆 0</div>
    
    <button class="click-btn" id="clickBtn">ЖМИ СЮДА</button>
    
    <div class="result" id="resultArea">
        ⚡ готов? жми на кнопку — игра начнётся!
    </div>
    <div class="promo" id="promoArea" style="display: none;">
        🎁 ТВОЙ ПРОМОКОД:<br>
        <span id="promocodeValue">----</span>
        <small style="display: block; font-size: 12px;">скидка 5-20% (как повезёт)</small>
    </div>
    <div class="info">
        ⏱️ 10 секунд на клики. <strong>минимум 10 кликов</strong> = промокод.<br>
        🔥 больше кликов → больше скидка! (5 кликов = 5%, 20+ = 20%)
    </div>
</div>
<script>
    (function(){
        let clicks = 0;
        let timeLeft = 10.0;
        let gameActive = false;
        let timerInterval = null;
        
        const clickBtn = document.getElementById('clickBtn');
        const timerDiv = document.getElementById('timerDisplay');
        const scoreDiv = document.getElementById('scoreDisplay');
        const resultDiv = document.getElementById('resultArea');
        const promoDiv = document.getElementById('promoArea');
        const promocodeSpan = document.getElementById('promocodeValue');
        
        function updateUI() {
            timerDiv.innerText = timeLeft.toFixed(1);
            scoreDiv.innerText = `🏆 ${clicks}`;
        }
        
        function generatePromocode(clicksCount) {
            const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let randomPart = '';
            for(let i = 0; i < 6; i++) {
                randomPart += letters[Math.floor(Math.random() * letters.length)];
            }
            const clickPart = clicksCount.toString(16).toUpperCase();
            return `CLICK-${randomPart}-${clickPart}`;
        }
        
        function calcDiscount(clicksCount) {
            if (clicksCount < 10) return 0;
            if (clicksCount >= 30) return 25;
            if (clicksCount >= 20) return 18;
            if (clicksCount >= 15) return 12;
            return 7; // от 10 до 14 кликов
        }
        
        function endGame() {
            gameActive = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            clickBtn.innerText = "НАЖАТЬ";
            
            if (clicks >= 10) {
                const discountPercent = calcDiscount(clicks);
                const rawPromocode = generatePromocode(clicks);

                const finalPromocode = `${rawPromocode}-${discountPercent}%`;
                promocodeSpan.innerText = finalPromocode;
                
                resultDiv.innerHTML = `🔥 УРА! ${clicks} кликов! 🔥<br>🎟️ Твоя скидка: ${discountPercent}%<br>Покажи этот код на кассе (или введи онлайн):`;
                promoDiv.style.display = 'block';
                resultDiv.classList.add('blink-text');
                setTimeout(() => resultDiv.classList.remove('blink-text'), 800);
            } else {
                resultDiv.innerHTML = `😭 Жалко... всего ${clicks} кликов. Надо минимум 10. Попробуй ещё раз — вдруг получится?`;
                promoDiv.style.display = 'none';
                if(clicks > 5) resultDiv.innerHTML += `<br>✨ не хватило всего ${10-clicks} кликов!`;
            }
            updateUI();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (timeLeft <= 0.05) {
                    timeLeft = 0;
                    updateUI();
                    endGame();
                } else {
                    timeLeft = Math.max(0, timeLeft - 0.1);
                    updateUI();
                }
            }, 100);
        }
        
        function startNewGame() {
            if (gameActive) return;
            clicks = 0;
            timeLeft = 10.0;
            gameActive = true;
            promoDiv.style.display = 'none';
            resultDiv.innerHTML = '🎲 ИГРА НАЧАЛАСЬ! ЖМИ БЫСТРЕЕ! 🎲';
            resultDiv.classList.remove('blink-text');
            updateUI();
            startTimer();
            clickBtn.innerText = "🔴 НАЖИМАЙ 🔴";
        }
        
        function handleClick() {
            if (!gameActive) {
                startNewGame();
            } else {
                clicks++;
                updateUI();
                clickBtn.style.transform = "translate(2px, 2px)";
                setTimeout(() => { clickBtn.style.transform = ""; }, 70);
                if (clicks % 7 === 0) {
                    timerDiv.style.backgroundColor = "#3a2a1a";
                    setTimeout(() => timerDiv.style.backgroundColor = "#1e1e1e", 150);
                }
            }
        }
        
        clickBtn.onclick = handleClick;
        
        timerDiv.addEventListener('dblclick', () => {
            if(!gameActive) {
                resultDiv.innerHTML = "🤫 тихо... читер: +5 фан-кликов (но в игре не считаются) 🤫";
                setTimeout(() => {
                    if(!gameActive) resultDiv.innerHTML = "⚡ готов? жми на кнопку — игра начнётся!";
                }, 2000);
            }
        });
        
        gameActive = false;
        updateUI();
        clickBtn.innerText = "ЖМИ СЮДА";
        resultDiv.innerHTML = "⚡ готов? жми на кнопку — игра начнётся!";
    })();
</script>
</body>
</html>
