<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер — получи скидку LOVE2026</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            margin: 0 0 10px;
        }
        .timer {
            font-size: 48px;
            font-weight: bold;
            background: #000000aa;
            border-radius: 20px;
            padding: 10px;
            margin: 10px 0;
        }
        .score {
            font-size: 36px;
            font-weight: bold;
            background: #ffa500;
            color: #1e3c72;
            border-radius: 20px;
            padding: 10px;
            margin: 10px 0;
        }
        .click-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 40px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 80px;
            width: 80%;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 8px 0 #c0392b;
        }
        .click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c0392b;
        }
        .click-btn.disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 8px 0 #7f8c8d;
        }
        .result {
            font-size: 20px;
            margin-top: 20px;
            padding: 10px;
            background: #2c3e50;
            border-radius: 20px;
        }
        .promo {
            background: #27ae60;
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        button {
            background: #27ae60;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 40px;
            margin: 5px;
            cursor: pointer;
        }
        .info {
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🖱️ КЛИКЕР 🖱️</h1>
    <p>Нажимай на кнопку быстрее! У тебя 10 секунд.</p>
    <div class="timer">⏱️ 10.0</div>
    <div class="score">🏆 Кликов: 0</div>
    <button class="click-btn" id="clickBtn">КЛИК!</button>
    <div class="result" id="resultArea"></div>
    <div class="promo" id="promoArea" style="display: none;">
        🎁 Ваш промокод: <span id="promocode">LOVE2026</span><br>
        <small>Скидка 10% на всё!</small>
    </div>
    <div class="info">Чтобы получить промокод, сделай не менее 10 кликов за 10 секунд.</div>
</div>

<script>
    let clicks = 0;
    let timeLeft = 10;
    let gameActive = false;
    let timerInterval = null;
    const clickBtn = document.getElementById('clickBtn');
    const timerDiv = document.querySelector('.timer');
    const scoreDiv = document.querySelector('.score');
    const resultDiv = document.getElementById('resultArea');
    const promoDiv = document.getElementById('promoArea');

    function updateUI() {
        timerDiv.innerText = `⏱️ ${timeLeft.toFixed(1)}`;
        scoreDiv.innerText = `🏆 Кликов: ${clicks}`;
    }

    function startGame() {
        if (gameActive) return;
        clicks = 0;
        timeLeft = 10;
        gameActive = true;
        clickBtn.classList.remove('disabled');
        promoDiv.style.display = 'none';
        resultDiv.innerHTML = '';
        updateUI();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endGame();
            }
            updateUI();
        }, 100);
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        clickBtn.classList.add('disabled');
        if (clicks >= 10) {
            resultDiv.innerHTML = `🎉 Поздравляем! Вы нажали ${clicks} раз. Получите ваш промокод:`;
            promoDiv.style.display = 'block';
        } else {
            resultDiv.innerHTML = `😢 Вы нажали только ${clicks} раз. Нужно минимум 10. Попробуйте ещё раз.`;
            promoDiv.style.display = 'none';
        }
    }

    clickBtn.onclick = () => {
        if (!gameActive) {
            startGame();
        } else {
            clicks++;
            updateUI();
            clickBtn.style.transform = 'scale(0.95)';
            setTimeout(() => { clickBtn.style.transform = ''; }, 100);
        }
    };

    // Автоматический старт при загрузке
    startGame();
</script>
</body>
</html>
